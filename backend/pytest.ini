[pytest]
asyncio_mode = auto
asyncio_default_fixture_loop_scope = function
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*
bdd_features_base_dir = tests/features/
# Clean, human-friendly output:
# --tb=short: Show short traceback on failure
# -v: Verbose - show test names
# -s: Show print output (LLM responses)
# -W ignore::DeprecationWarning: Hide deprecation warnings
addopts = --tb=short -v -s -W ignore::DeprecationWarning
markers =
    integration: marks tests as integration tests (require real services)
